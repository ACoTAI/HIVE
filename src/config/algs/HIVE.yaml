# --- QMIX specific parameters ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 100000
evaluation_epsilon: 0.0

runner: "episode"

buffer_size: 5000

# update the target network every {} episodes
target_update_interval: 200

# use the Q_Learner to train
agent_output_type: "q"
learner: "HIVE_learner"
double_q: True
mixer: "HIVE_MIX"
name: "HIVE"

add_self: False
concat: True
sample_num: null
hidden_dim: 64 # 128
hyper_hidden_dim: 64 #128
head_num: 1
hyper_edge_num: 4 # baseline: 32
sample_size: 10
agent: "rnn"
heads: 4
depth: 2
ff_hidden_mult: 4
dropout: 0.1
hypernet_layers: 2
hypernet_embed: 64
use_rnn: True
burn_in_period: 100
mac: "basic_mac"

hpn_head_num: 1
