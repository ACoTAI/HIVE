# --- QMIX specific parameters ---

# use epsilon greedy action selector
action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 50000

runner: "episode"

buffer_size: 5000

# update the target network every {} episodes
target_update_interval: 200

# use the Q_Learner to train
agent_output_type: "q"
learner: "hgcn_learner"
double_q: True
mixer: "HGCN_MIX"
name: "HGCN_MIX"

add_self: False
concat: True
sample_num: null
hidden_dim: 128
hyper_hidden_dim: 128
head_num: 1
hyper_edge_num: 32 # baseline: 32
agent: "rnn"
heads: 4 # head number of transformer
depth: 2 # block number of transformer
ff_hidden_mult: 4 # relative dimension of hidden layer of ff after attention
dropout: 0. # multi-head attention dropout

standardise_returns: False
standardise_rewards: False

use_rnn: False
evaluation_epsilon: 0.0
target_update_interval_or_tau: 200